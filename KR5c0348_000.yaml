front:
  text: 神仙養生祕術松十
  hash: sha256:2e69530c18b45172949ae42e59188d146392286337d157605d46a723a5c3f465
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0348_HFL_000-001a, image: hfl/0599/0599-110.png}
body:
  text: 太白山人傳後趙黃門侍郎劉景先受宋抱一子校正其一靈砂靈少一料石七斤水銀一斤硫黃四兩先將硫黃化開次下水銀炒成砂子住火了或是湘陰瓶或是西蜀嘉定瓶或是沙瓶老酒瓶甘泥固濟三寸厚陰乾裝入瓶內用鐵燈盞一箇坐其口盞內水長要不乾用甘泥固濟口縫留哨眼一箇用鐵線一條穿定燈盞瓶耳入爐用炭一百二十斤早晨下火至來日早晨住火晌午出爐打破瓶取出要做心紅研為細末若做靈砂再有别法其二心紅水銀一斤硫黃四兩先將硫黃化開次下水銀或是湘陰西蜀嘉定瓶或是沙瓶老酒瓶甘泥固濟三寸厚陰乾裝入瓶內用燈盞一箇坐其口盞內水長要不乾甘泥固濟口縫留哨眼一箇用鐵線一條穿定燈盞瓶耳入爐用炭一百二十斤早晨下火至來日早晨住火午時出爐冷定打破瓶取出揀了核子研為細末用水五桶或是盆甕一處再研之伏時或是盆甕內坐起水定上面是板紅第二是二紅底坐是心紅用刀劙開用花日頭曬用銀紙包裹隨更用紙包其三死汞水銀一斤黑錫一斤山澤一斤黑錫打成盒子一箇山澤打成盒子一箇山澤盒子先裝水銀封閉不透風錫盒子盛銀盒子在內入鐵鼎內用赤石脂生蜜固濟鼎口牢固用鐵線上下縛定入丹房靜室處用炭二百五十斤戌時下火來日卯時出打開鼎不見黑錫不見汞山澤二斤任意使用此是祕術其四點白硇砂四兩膽礬四兩雄黃四兩雌黃四兩硝石四兩枯礬四兩山澤四兩青鹽四兩各自制度右為細末如粉作匱用樟柳根鹽酒醋調和為一升用甘鍋一箇裝雲南銅四兩入爐用風匣搧又瓦蓋鎔開下硇砂二錢攪勻次下前藥二兩山澤一兩再搧混葺一處住火青如滑池內冷定成至寶也任意細軟使用其五拔毛山澤一兩白礬一兩硇砂一兩水銀一兩白鐵一兩膽礬一兩硝石一兩各自制度石斫為細末甘鍋一箇用銅半斤入炒煉三便如桃花色甘鍋一箇下銅二兩於在爐內炭火燒之用風匣搧一瓦蓋之下山澤五錢硇砂半錢混葺再下前藥二錢半住火出爐走滑池三便再入甘鍋消成至寶任意使用或作細軟或作器盒此是祕訣也其六縮賀用白錫十斤鑄成牌子縮賀勝如法人間世罕聞闊一寸長三寸頭上留眼子一箇用菉豆鐵條穿牌子放在池內不要著地三七二十一日取出牌子鐵鍋內化開再鑄牌子八十一日取出化開再鑄成牌子一百五十日取出化開再鑄牌子三百日取出化開再鑄牌子六百日伏火為度更著鐵鎚為度造成器盒如要做細軟再六百日成至寶千年不變此是祕術也其七作池方圓二丈七尺深用磚砌合麻搗石灰泥縫池上蓋厠室存大糞可用五尺深别無疑慮經心修時用錢馬獻供不許人知泄漏天機非人勿示其八潑銅緑用銅十斤鑄板用銅鍋一口淳醋一簷硇砂一斤與醋相和用火燒煎火常不離用藥醋澆板到二時辰住刮去緑再澆如板白剩三分不用將澄緑就便焙乾任意使用也其九作線頭用黃牛膝骨一箇旋成珠子如豌豆大鑽眼子用銀箔百十餘箇金腳信一錢用處磁內煞研細口含膠水旋旋的吐在碗內研一遍用清水淘一遍七遍為度用線一條一頭結榾柮一箇穿珠子用新葦一管塗箔在珠子上又用淨綿花按定如有毫光者為度如淡再度入口不退色為度任從使用非人勿示不問大小隨意做造此是祕術聚八仙點阿其一桑花槐花梔子花皂角花白鶴花蜜蒙花款冬花地棠花右八味各二兩研為細末用蜜一斤於銅鍋內化開隔年蔥白不拘多少點蜜滴水不散下藥一兩薑黃半錢住火攪勻坐水盆內定任意使用其二松花地丁花皂角花蜜蒙花桃花黃茨梅花黃菊花杏花各一兩右為細末用蜜一斤於銅鍋內化開用隔年蔥白五七根用手攪蜜滴水不散下藥一兩薑黃半錢住火攪勻坐水盆內定任意用之其三金剛花兔絲花芙蓉花夜合花曼陀羅花白芍藥花木荆花白樟柳根花各一兩右為細末用蜜一斤銅鍋內化開用隔年蔥攪蜜死滴水不散住火攪勻下藥一兩再攪勻下薑黃末一錢坐水盆內定其四松花曼陀羅花蒼耳花桑花蜜蒙花牡丹花銀杏花春花杏花各一兩右為細末蜜一斤銅鍋內化開用隔年蔥白汁點蜜死滴水不散下藥一兩薑黃末一錢住火攪勻水盆內坐其五金盞花望江南花摘金盞花白葵花皂角花桑花梔子花各一兩右為細末蜜一斤銅鍋內化開用隔年蔥汁點蜜死滴水不散下藥一兩薑黃一錢住火攪勻入水盆坐其六黃菊花曼陀羅花蒼耳花望江南花白鶴花松花皂角花桑花苦參花黃芫花天仙子花白牽牛花甘菊花蜜蒙花款冬花黃茨梅花梔子花珍珠花地棠花牡丹花春花白芍藥花金靈子花各一兩曬乾右為細末用蜜五斤銅鍋內鎔開用隔年蔥五斤取汁入蠟內前藥一斤半攪成一塊丸如彈子大重二錢半蜜一斤銅銚子內化開下藥一丸藥化盡去了甜味滴水不散坐入水盆內如色淡加薑黃末一錢其七青蒙花皂角花銀杏花桑花狗兒花臘梅花西瓜花右七味各一兩蜜一斤銅鍋內化開用隔年蔥白攪蜜死滴水不散下藥一兩薑黃末一錢住火攪勻坐用其八金錢玄胡白玄胡瓜蔞根甘草桑黃卜固因各等分右為細末蜜一斤銅鍋內化開用隔年蔥白攪勻蜜死滴水不散下藥半兩薑黃半錢住火攪勻坐用歌曰金錢玄胡瓜蔞根甘草桑黃卜固因百花一斤藥半兩此法益利勝燒金其九聖蠟法菉豆粉十斤梔子二斤因粉鵝黃色蠟一斤右置銅鍋內化開下粉一斤松花一兩有松花下一斤無松花下半斤住火攪勻乾盆內坐用其十寒水石五斤薑黃四兩攪勻為末二味和為一處右為細末如粉細蠟一斤下藥半斤住火攪勻乾盆坐用其十一白膠香十斤用茄桿灰五斤右淋水一桶煮白膠香共升氣息為度蠟一斤銅鍋化開下藥一斤薑黃二錢住火攪勻乾坐用其十二陳葵子一斗炒香熟去皮研為細末十斤薑黃末一兩一處攪勻蠟十斤銅鍋內化開二味和一處住火攪勻乾盆坐其十三造白蠟法烏桕油五斤右銅鍋內化開住火用綿濾過蠟十斤銅鍋化開下入烏桕油一處住火攪勻分作三塊其十四造黃蠟法松花四兩黃米粉二斤梔子二兩右熬水同粉黃色曬乾蠟一斤銅鍋內化開共藥一處攪勻住火乾盆坐用其十五菉豆粉一斤寒水石一斤葵子末半斤蛤粉一斤薑黃末一兩半右五味研為細末如粉蠟五斤銅鍋內化開共下藥一處住火攪勻乾盆坐分作三塊住香下共藥一處住火攪勻乾盆坐其十六松花四兩白礬四兩寒水石四兩蛤粉四兩右為細末蠟三斤銅鍋內化開下共藥一處住火攪勻乾盆坐作二塊其一稱輕粉訣水銀一斤硫黃四兩先將硫黃於鐵銚內鎔開次下水銀於硫黃內一處炒成砂與用蜜陀僧四兩焰硝二兩作麯子春夏三日秋冬七日將前件砂子於麯子一處攪勻用鐵大𨫼一箇攤砂子在上用瓦盆一箇蓋𨫼用蜜調赤石脂固濟口縫底下用木炭火文武燒之早晨下火午時住火冷定揭起藥在盆上掃下用木匣子盛之四兩一匱任意使用盆底是粉霜上面是輕粉此是奧妙祕術其二七寶溫涼硫黃盞用舶上硫黃一斤分四處一箇是四兩硃砂心紅膽礬輕粉青黛官粉銅緑右每味各一兩各自制度研如粉盞一箇用藥三錢水盞內坐用處州磁盞一箇用生絹手帕一箇中心留眼用茶托子一箇或酒滿上蓋之日晚放上酒來日早晨空心服冬暖夏涼治一切下元虛冷單硫黃盞治下元虛冷同前七寶盞一般用嗅硫黃一箇不問大小同前盞一般置造用度其三擦揩白如銀治銅法膽礬枯白礬真燒銀水銀鹿角灰硇砂各五錢先將白鐵於鍋內化開次下水銀就熱攪勻研為末次將銀子化開下硇砂朋砂就熱研為細末枯白礬膽礬鹿角灰研為細末總藥八味一處再研如粉如要使用先將皂角水洗銅器三遍然後用葉揩之用紙封裹七日一遍三遍為度此是妙祕或定也非人勿示聖蠟燭法白膠香四兩硫黃四兩槐角子四兩八月收先將槐角子搗爛將白膠香硫黃一同鎔開用竹筒長七寸將藥灌之一條可燃一月神妙省油方浮萍草六月收瓦松六月收遠志黃丹蛤粉各一兩右為細末每油一兩用藥一錢可點一月聖蠟燭法槐角子二斤八月收白膠香一斤硫黃四兩先將槐角子搗爛用沙鍋化開白膠香次入槐角一處熬爛次下硫黃一處用槐條攪勻用竹筒長七寸粗如大指灌入筒內陰乾去其筒子不用每一條可點六十日妙治墨法松煙十兩阿膠四兩藿香甘松薑汁豬牙皂角四味用水熬少時去滓沾清十兩中化阿膠四兩膠用金箔三箇銀箔二箇和煙一處攪勻用杵搗一萬下取出過成錠子次入灰池內春五日夏三日秋七日冬十日取出任意用死蜜法先用白沙蜜一斤用無油鐵鍋一箇次下蜜在銚內隔年蔥十根攪蔥熟取出再將新蔥十根攪勻文武火煅之次用水一碗將蜜滴水中不散不沾牙不沾手此即成寶脫胎换骨也悟修合祕之後同細藥取顔色如黃金馬皮包去皮取裏面白的好一兩半桑花皂角花槐花白天門冬蔥花兔絲子臘梅花蜜蒙花甘菊花各一兩半右為細末和勻一處每一斤蜜用藥一兩半攪勻取出傾在冷水成塊此即是死蜜祕法任意用之仙方百花膏蜜蒙甘草瓜蔞根玄胡桑黃白芨停百花一斤藥二兩勝如燒金共燒銀右為細末用為一處銅銚內化開百花將前藥倒在一處攪勻用生絹濾入水中摶成塊任意用妙靈丹食柏葉百草常飽不飢避難絶食杜仲一斤去粗皮醋浸一宿焙乾炒搗羅為細末荆芥穗一斤搗羅為細未白茯苓一斤去皮甘草一斤去皮薄苛半斤右為細末煉蜜為丸小指大將柏葉水洗淨和藥同入口內細嚼食為妙知命丹避難絶食濟飢木香白茯苓赤石脂乳香水銀黑錫與水銀同結子砂器另研細硃砂雄黃蜜陀僧已上各一錢黃蠟六錢松脂三錢右九味都為細末將松脂黃蠟鎔開為丸可重一錢如服藥時飽喫糯米粥一頓後用乳香湯下一丸至五七日又服一丸服至二丸盡用棗七箇初一日都服七枚每日或盡棗永不飢已發渴飲水呪水法唵霹靂火公奉勑攝存太陽取氣一口吹在水中飲水時呪之絶食後心清意淨內想不出外想不入昔日有傳方太醫嚴仲山自癸巳年七月初三日逃避唐州危難無食至死嶮矣服藥全家絶食四十九日得保身安康復舊如初仙酒方糯米用一二升亦可用度好麯四兩大麥蘖一兩半醉子二兩右為細末用水五升煮粥取出次入藥一處攪勻復明酒香其效如神不誤修合乾酒方肉桂一兩黑附子一兩好蜜一兩川椒一兩兩生薑二兩杏仁二兩去皮如泥神麯一斤右為細末用粟米二升淘淨蒸熟將藥末和飯一處攪勻入瓶罐內三宿取出搗爛丸如雞頭大入瓶內盛了用紙封口勿令透風至七日取出見風時一箇時辰再入瓶內依前封不計年分若要喫酒時將熟水五升藥一丸放在水內濕紙封口不多時聞酒香蓋用獻聖飲神仙餌生地黃延年法生地黃不以多少肥者陰乾為細末煉蜜為丸如梧桐子大每服如湯酒下三十九日進三服百日顔如桃花至三年令人長生矣神仙餌蒺藜方蒺藜一石常以七八月熟收之採來曝乾先入臼舂去刺然後為細末每服二匙新水調下日進三服勿令斷絶服之長生服一年後冬不寒夏不熱服之二年老返少頭白再黑齒落重生服至三年身輕延年絶糧方黑豆四升妙去皮火麻子四升煮搗為末每服一合水調下日進三服十日可斷穀冬夏不令寒熱也神仙服槐子延年不老方常以十月上巳日取在新瓷器內盛之以盆合其上密泥勿令走氣三七日開取去皮從月初日服一粒以水下日加一粒直至月半却減一粒為度終而復始令人可依夜看書久服此氣力百倍辟穀住食方凡欲住食必先住心秫米一斗小油六兩炒冷鹽末川薑小椒各等分十兩蔓菁子三升乾大棗五升右六味為細末每服一大匙新水調下日進三服如飢渴漸有力如喫諸般果木茶湯自意不可食肉大忌也走死的馬飲殺的驢脹死的牛紅眼的羊自死的豬有彈的鱉懷胎的兔無鱗的魚自古有書云皆不可食之若食之者生百疾也辟穀方永寧二年二月十七日黃門侍郎劉景先表言臣遇太白山隱士得此方臣聞京師米糧大貴宜以此濟之令人不飢耳目聰明顔色光澤如有誑妄臣一家甘受刑戮四季用黑豆五升淨洗後蒸三遍曬乾去皮又用大火麻子三升湯浸一宿漉出曬乾膠水拌曬去皮淘淨蒸三遍碓搗次下豆黃共為細末用糯米粥合和成圓如拳大入甑蒸從夜至子住火至寅取出於磁器內盛蓋不令風乾每服三塊但飽為度不得食一切物第一頓七日不飢第二頓七七日不飢第三頓三百日不飢容貌佳勝更不憔悴渴即研火麻子漿飲更滋潤臟腑若要重喫物用葵子三合杵碎煎湯飲開導胃脘以待沖和無損此方勒石漢陽軍别山太平興國寺神仙養生祕術
